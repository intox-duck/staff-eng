<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex,nofollow">
<title>Sign In | Staff SWE London</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Figtree:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #09111f;
    --panel: rgba(15, 23, 42, 0.88);
    --panel-border: rgba(148, 163, 184, 0.24);
    --text: #e2e8f0;
    --muted: #94a3b8;
    --accent: #38bdf8;
    --accent-2: #22d3ee;
    --danger: #fb7185;
  }

  * {
    box-sizing: border-box;
  }

  body {
    margin: 0;
    min-height: 100vh;
    display: grid;
    place-items: center;
    padding: 24px;
    background:
      radial-gradient(circle at top left, rgba(34, 211, 238, 0.16), transparent 32%),
      radial-gradient(circle at bottom right, rgba(56, 189, 248, 0.18), transparent 28%),
      linear-gradient(135deg, #020617 0%, #0f172a 55%, #111827 100%);
    color: var(--text);
    font-family: "Figtree", sans-serif;
  }

  .shell {
    width: min(100%, 960px);
    display: grid;
    grid-template-columns: 1.1fr 0.9fr;
    border: 1px solid var(--panel-border);
    border-radius: 24px;
    overflow: hidden;
    background: rgba(2, 6, 23, 0.45);
    box-shadow: 0 30px 80px rgba(2, 6, 23, 0.45);
    backdrop-filter: blur(16px);
  }

  .intro,
  .panel {
    padding: 40px;
  }

  .intro {
    background:
      linear-gradient(160deg, rgba(8, 47, 73, 0.7), rgba(15, 23, 42, 0.35)),
      linear-gradient(180deg, rgba(6, 182, 212, 0.08), transparent);
  }

  .eyebrow {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 18px;
    padding: 6px 12px;
    border-radius: 999px;
    background: rgba(56, 189, 248, 0.14);
    color: var(--accent);
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  .auth-logo-strip {
    display: inline-flex;
    align-items: center;
    gap: 12px;
    flex-wrap: nowrap;
    white-space: nowrap;
    padding: 0;
    margin-bottom: 18px;
  }

  .auth-logo {
    height: 18px;
    min-height: 18px;
    max-height: 18px;
    width: auto;
    display: block;
    object-fit: contain;
    flex: 0 0 auto;
  }

  .auth-logo--x {
    height: 13px;
    min-height: 13px;
    max-height: 13px;
  }

  .auth-logo--chapter2 {
    border-radius: 4px;
  }

  h1 {
    margin: 0 0 16px;
    font-size: clamp(32px, 5vw, 48px);
    line-height: 0.95;
    letter-spacing: -0.04em;
  }

  .intro p {
    margin: 0;
    max-width: 28rem;
    color: var(--muted);
    font-size: 15px;
    line-height: 1.7;
  }

  .panel {
    background: var(--panel);
  }

  .panel h2 {
    margin: 0 0 8px;
    font-size: 24px;
    letter-spacing: -0.03em;
  }

  .panel-copy {
    margin: 0 0 28px;
    color: var(--muted);
    line-height: 1.6;
  }

  form {
    display: grid;
    gap: 18px;
  }

  label {
    display: grid;
    gap: 8px;
    font-size: 13px;
    font-weight: 600;
    color: var(--muted);
  }

  input {
    width: 100%;
    border: 1px solid rgba(148, 163, 184, 0.22);
    border-radius: 14px;
    padding: 14px 16px;
    background: rgba(15, 23, 42, 0.8);
    color: var(--text);
    font: inherit;
  }

  input:focus {
    outline: 2px solid rgba(56, 189, 248, 0.4);
    outline-offset: 2px;
    border-color: var(--accent);
  }

  button {
    border: 0;
    border-radius: 14px;
    padding: 14px 18px;
    background: linear-gradient(135deg, var(--accent), var(--accent-2));
    color: #082f49;
    font: inherit;
    font-weight: 800;
    cursor: pointer;
  }

  button:disabled {
    opacity: 0.7;
    cursor: wait;
  }

  .status {
    min-height: 24px;
    margin-top: 14px;
    color: var(--muted);
    font-size: 14px;
  }

  .status[data-state="error"] {
    color: var(--danger);
  }

  @media (max-width: 760px) {
    .shell {
      grid-template-columns: 1fr;
    }

    .intro,
    .panel {
      padding: 28px;
    }

    .auth-logo {
      height: 16px;
      min-height: 16px;
      max-height: 16px;
    }

    .auth-logo--x {
      height: 11px;
      min-height: 11px;
      max-height: 11px;
    }
  }
</style>
</head>
<body>
  <div class="shell">
    <section class="intro" aria-hidden="true">
      <div class="auth-logo-strip" role="img" aria-label="Multiverse, X, and Chapter2 logos">
        <img class="auth-logo" src="./multiverse.png" alt="Multiverse">
        <img class="auth-logo auth-logo--x" src="./x%20dep.png" alt="X">
        <img class="auth-logo auth-logo--chapter2" src="./C2a.png" alt="Chapter2">
      </div>
      <div class="eyebrow">Protected Access</div>
      <h1>Talent Intelligence<br>Dashboard</h1>
      <p>
        This report is access-controlled at the Vercel edge. Sign in with the provisioned account to view the dashboard.
      </p>
    </section>

    <section class="panel">
      <h2>Sign in</h2>
      <p class="panel-copy">Use the account provisioned for this report. A secure session cookie will be issued after authentication.</p>

      <form id="login-form">
        <label>
          Email
          <input id="username" name="username" type="email" autocomplete="username" required>
        </label>

        <label>
          Password
          <input id="password" name="password" type="password" autocomplete="current-password" required>
        </label>

        <button id="submit-button" type="submit">Enter dashboard</button>
      </form>

      <p class="status" id="status" aria-live="polite"></p>
    </section>
  </div>

  <script>
    const form = document.getElementById("login-form");
    const submitButton = document.getElementById("submit-button");
    const status = document.getElementById("status");

    form.addEventListener("submit", async function(event) {
      event.preventDefault();

      status.textContent = "Signing in...";
      status.dataset.state = "pending";
      submitButton.disabled = true;

      const payload = {
        username: document.getElementById("username").value.trim(),
        password: document.getElementById("password").value
      };

      try {
        const response = await fetch("/api/login", {
          method: "POST",
          headers: {
            "content-type": "application/json"
          },
          body: JSON.stringify(payload)
        });
        const result = await response.json();

        if (!response.ok) {
          throw new Error(result.error || "Unable to sign in.");
        }

        window.location.href = "/";
      } catch (error) {
        status.textContent = error.message;
        status.dataset.state = "error";
        submitButton.disabled = false;
      }
    });
  </script>
</body>
</html>
